<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>retro</title>
<script>
/* Apply the persisted theme before first paint to avoid a flash of the wrong
   palette. The main script (end of body) defines setTheme() and wires the live
   prefers-color-scheme listener; this only sets the initial data-theme. */
(function () {
  try {
    var mode = localStorage.getItem('retro-theme') || 'auto';
    var dark = mode === 'dark' ||
      (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  } catch (e) { /* localStorage/matchMedia unavailable — fall through to light */ }
})();
</script>
<style>
/* ==== retro-theme.css — embedded verbatim (system-mono fallback in --font) ==== */
/* retro UI — "desktop" direction theme. Embed in the single-file dashboard. */
/* Mockups use Space Mono (webfont); production falls back to system mono per repo constraints. */
:root{
  --font:"Space Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  /* light (default) */
  --desk-a:#dcd9cf; --desk-b:#d7d4c9;        /* checkerboard desktop */
  --panel:#f4f2ea;                            /* window/panel bg */
  --line:#4a463c;                             /* hard 1px outlines */
  --line-soft:#a89f8d;                        /* dotted dividers, input borders */
  --bevel-hi:#fff; --bevel-lo:#8a867a;        /* 2px window bevel */
  --ink:#26231c; --ink-soft:#5a5548; --ink-faint:#7d7668;
  --accent:#0da53c;                           /* THE green: active tab, retro-owned, ok */
  --accent-wash:#e9f3e4;                      /* selected-row bg */
  --alert:#a8402e;
  --chip:#e6e3d8;                             /* dropdown/segment bg */
  --field:#fff;                               /* inputs, bar tracks, button bg */
  --bar-global:#57503f;                       /* solid segment: global CLAUDE.md */
  --shadow:rgba(20,19,15,.2);                 /* 2px 2px 0 button shadow */
}
[data-theme=dark]{
  --desk-a:#15170f; --desk-b:#181a12;
  --panel:#1e211a;
  --line:#3c4034; --line-soft:#4a4f41;
  --bevel-hi:#4d5142; --bevel-lo:#0b0d09;
  --ink:#d6d8cc; --ink-soft:#a3a894; --ink-faint:#767b6c;
  --accent:#2ee85c; --accent-wash:#232c1d;
  --alert:#e85c48;
  --chip:#262a20; --field:#0b0d09;
  --bar-global:#4d5142;
  --shadow:rgba(0,0,0,.45);
}
body{margin:0;font:13px/1.5 var(--font);color:var(--ink);
  background:repeating-conic-gradient(var(--desk-a) 0 25%,var(--desk-b) 0 50%) 0 0/8px 8px}
/* ── window chrome ── */
.window{background:var(--panel);border:2px solid;outline:1px solid var(--line);
  border-color:var(--bevel-hi) var(--bevel-lo) var(--bevel-lo) var(--bevel-hi)}
.titlebar{display:flex;align-items:center;height:24px;position:relative;padding:0 9px;
  border-bottom:1px solid var(--line);
  background:repeating-linear-gradient(0deg,var(--panel) 0 2px,color-mix(in oklab,var(--line) 60%,var(--panel)) 2px 3px,var(--panel) 3px 5px);
  background-position:0 5px}
.titlebar .box{width:11px;height:11px;border:1px solid var(--line);background:var(--panel)}
.titlebar .title{position:absolute;left:50%;transform:translateX(-50%);
  background:var(--panel);padding:0 12px;font-weight:700;font-size:11px}
.titlebar .meta{margin-left:auto;background:var(--panel);padding:0 6px;font-size:10px;color:var(--ink-faint)}
/* dark titlebars tint the title with the accent */
[data-theme=dark] .titlebar .title{color:var(--accent)}
/* ── controls ── */
.btn{border:1px solid var(--line);background:var(--field);padding:1px 8px;font-size:10px;
  box-shadow:2px 2px 0 var(--shadow);cursor:pointer;font-family:inherit}
.btn:active{box-shadow:none;transform:translate(2px,2px)}
.btn-danger{background:var(--alert);color:var(--panel);font-weight:700}
.chip{border:1px solid var(--line);background:var(--chip);padding:3px 10px;font-size:11px;cursor:pointer}
/* ── nav (top bar = the only nav) ── */
.menubar{display:flex;align-items:center;gap:22px;padding:7px 18px;background:var(--panel);
  border-bottom:1px solid var(--line);font-size:12px}
.menubar .tab{color:var(--ink-faint);cursor:pointer}
.menubar .tab.active{color:var(--ink);border-bottom:2px solid var(--accent);padding-bottom:1px}
/* ── front panel (bottom bar = pure status, never nav) ── */
.front-panel{display:flex;align-items:center;background:var(--panel);border-top:1px solid var(--line);font-size:11px}
.front-panel>span{padding:8px 18px;border-right:1px solid var(--line);color:var(--ink-faint)}
.front-panel .health{margin-left:auto;border-right:0;border-left:1px solid var(--line);color:var(--accent)}
.front-panel .health.alert,.front-panel .alerted{color:var(--alert)}
/* ── data states ── */
.row-selected{background:var(--accent-wash);outline:1px solid var(--accent);outline-offset:-3px}
.row-held{opacity:.55}
.row-vetoed{opacity:.4}
.row-vetoed b{text-decoration:line-through}
/* token bar segments (context viz) */
.bar{height:15px;border:1px solid var(--line);display:flex;background:var(--field)}
.seg-global{background:var(--bar-global)}
.seg-project{background:repeating-linear-gradient(45deg,var(--line-soft) 0 3px,var(--field) 3px 6px)}
.seg-retro{background:var(--accent)}
.seg-memory{background:repeating-linear-gradient(0deg,var(--accent) 0 2px,var(--field) 2px 4px)}
/* modal */
.overlay{position:absolute;inset:0;background:rgba(38,35,28,.5);display:flex;align-items:center;justify-content:center}
.dialog{width:460px;box-shadow:8px 8px 0 var(--shadow)}

/* ==== app chrome additions — layout + the few bits the theme recipe leaves
   to the host page (brand cell, menu meta, view padding). No inline styles. ==== */
html{height:100%}
body{height:100vh;overflow:hidden;display:flex;flex-direction:column}
#main{flex:1;min-height:0;overflow:auto;padding:12px}
/* brand is bold, and accent-tinted in dark (matches frames 1a/1b) */
.menubar .brand{font-weight:700}
[data-theme=dark] .menubar .brand{color:var(--accent)}
/* right-aligned, faint menu meta (version · date · clock · hooks) */
.menubar .meta{margin-left:auto;color:var(--ink-faint)}
.front-panel .brand{font-weight:700;color:var(--ink)}
[data-theme=dark] .front-panel .brand{color:var(--accent)}
/* placeholder body for the stubbed tabs (Tasks 3–6 replace these) */
.stub{padding:16px 18px;color:var(--ink-faint)}
/* generic state tint helpers (hooks dot, error text) */
.ok{color:var(--accent)}
.bad{color:var(--alert)}
.dim{color:var(--ink-faint)}
.link{text-decoration:underline;cursor:pointer}
/* ── overview layout ── */
.ov-grid{display:grid;grid-template-columns:1.45fr 1fr;grid-template-rows:auto auto;gap:12px}
.ov-learned{grid-column:1;grid-row:1/3;display:flex;flex-direction:column}
.ov-context{grid-column:2;grid-row:1}
.ov-bottom{grid-column:2;grid-row:2;display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* learned-this-week */
.learn-list{padding:8px 16px 12px;font-size:12px;flex:1}
.learn{padding:8px 0;border-bottom:1px dotted var(--line-soft)}
.learn:last-child{border-bottom:0}
.learn-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.learn-meta{color:var(--ink-faint);font-size:11px}
.learn-desc{color:var(--ink-soft);font-size:11.5px;margin-top:2px}
.learn-foot{border-top:1px solid var(--line);padding:8px 16px;font-size:11px;color:var(--ink-faint);display:flex;justify-content:space-between;gap:12px}
.conf{color:var(--ink-faint);font-size:11px;white-space:nowrap}
/* context bars */
.ctx-body{padding:16px 18px;display:grid;grid-template-columns:150px 1fr 68px;gap:11px 14px;align-items:center;font-size:12px}
.ctx-name{font-weight:700}
.ctx-total{text-align:right;font-weight:700;font-size:14px}
.ctx-legend{grid-column:1/-1;display:flex;gap:18px;font-size:10px;color:var(--ink-faint);margin-top:3px;flex-wrap:wrap}
.swatch{display:inline-block;width:9px;height:9px;vertical-align:-1px}
.bar-agg{height:15px;border:1px dashed var(--line-soft);display:flex;background:transparent}
/* stat numerals + file list */
.pad{padding:12px 16px}
.stats{display:flex;gap:20px;align-items:baseline}
.stat-n{font-size:26px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--ink-faint)}
.filelist{margin-top:10px;padding-top:8px;border-top:1px dotted var(--line-soft);font-size:11px;color:var(--ink-soft);line-height:1.9}
.kv{display:flex;justify-content:space-between;gap:12px}
.pipe{padding:10px 16px;font-size:11.5px;color:var(--ink-soft);line-height:2.05}
/* Carried-over discipline: a later task's modal sets display:flex at equal
   specificity and is declared later — without !important the backdrop would
   permanently cover the page. Keep the !important. */
.hidden{display:none !important}
</style>
</head>
<body>
<div class="menubar">
  <span class="brand">▞ retro</span>
  <span class="tab active" data-tab="overview">Overview</span>
  <span class="tab" data-tab="knowledge">Knowledge</span>
  <span class="tab" data-tab="activity">Activity</span>
  <span class="tab" data-tab="config">Config</span>
  <span class="meta" id="menuMeta"></span>
</div>
<main id="main"></main>
<div class="front-panel">
  <span class="brand">▞ front panel</span>
  <span id="fpStore">store —</span>
  <span id="fpQueue">queue —</span>
  <span id="fpBudget">budget —</span>
  <span id="fpPush">push —</span>
  <span class="health" id="fpHealth">…</span>
</div>
<script>
// Version shown in the menu meta. The release task (bump-to-3.1.0) keeps this
// in sync with the crate version — retro has no endpoint that reports it, so a
// hardcoded const is the honest, single non-live bit in the chrome.
const VERSION = "3.1.0";

/* ── helpers (preserved from the 3.0.0 dashboard) ───────────────────── */
const $ = (s, el = document) => el.querySelector(s);
// Escapes & < > " ' — EVERY server-supplied string routed through innerHTML
// must pass through this.
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const get = async p => { const r = await fetch(p); if (!r.ok) throw new Error((await r.json()).error || r.status); return r.json(); };
const post = async (p, body) => { const r = await fetch(p, { method: "POST", body: JSON.stringify(body) }); const j = await r.json(); if (!r.ok) throw new Error(j.error || r.status); return j; };

/* ── formatting ─────────────────────────────────────────────────────── */
// Thousands separators (17658 -> "17,658"). Non-finite -> "—".
const fmtNum = n => Number.isFinite(n) ? Math.round(n).toLocaleString("en-US") : "—";
// Compact abbreviation for aggregate totals (21342 -> "21.3K").
const kAbbr = n => !Number.isFinite(n) ? "—" : n < 1000 ? String(Math.round(n)) : (n / 1000).toFixed(1) + "K";
// 5-block confidence glyph as TEXT (not a widget): 0.80 -> "■■■■□ .80".
function glyph(conf) {
  const c = Number.isFinite(conf) ? Math.max(0, Math.min(1, conf)) : 0;
  const filled = Math.round(c * 5);
  const frac = c.toFixed(2).replace(/^0/, ""); // "0.80" -> ".80"
  return "■".repeat(filled) + "□".repeat(5 - filled) + " " + frac;
}
// tokens_est of an xray file object, 0 when absent.
const tok = f => (f && f.present && Number.isFinite(f.tokens_est)) ? f.tokens_est : 0;
// A window with a centered-title bar (the desktop chrome recipe).
function win(title, meta, bodyHtml, extraClass) {
  const m = meta ? `<span class="meta">${esc(meta)}</span>` : "";
  return `<div class="window${extraClass ? " " + extraClass : ""}">
    <div class="titlebar"><span class="box"></span><span class="title">${esc(title)}</span>${m}</div>
    ${bodyHtml}
  </div>`;
}

/* ── theme ──────────────────────────────────────────────────────────── */
const prefersDark = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
function themeMode() { try { return localStorage.getItem('retro-theme') || 'auto'; } catch (e) { return 'auto'; } }
function resolveTheme(mode) {
  if (mode === 'dark') return 'dark';
  if (mode === 'light') return 'light';
  return prefersDark && prefersDark.matches ? 'dark' : 'light'; // auto
}
function applyTheme() { document.documentElement.setAttribute('data-theme', resolveTheme(themeMode())); }
// Persist + apply. The Config tab (Task 6) wires its segmented control to this.
function setTheme(mode) { try { localStorage.setItem('retro-theme', mode); } catch (e) { } applyTheme(); }
// Live-follow the OS setting while in auto mode.
if (prefersDark) prefersDark.addEventListener('change', () => { if (themeMode() === 'auto') applyTheme(); });
applyTheme(); // idempotent with the pre-paint apply in <head>

/* ── tab shell + router ─────────────────────────────────────────────── */
// Each view returns the HTML for #main. Stubs this task; Tasks 3–6 fill in the
// real bodies (they may become async — render() already awaits the result).
function stub(name) {
  return `<div class="window">
    <div class="titlebar"><span class="box"></span><span class="title">${esc(name)}</span></div>
    <div class="stub">${esc(name)} — coming in a later task.</div>
  </div>`;
}
const views = {
  overview: () => stub("Overview"),
  knowledge: () => stub("Knowledge"),
  activity: () => stub("Activity"),
  config: () => stub("Config"),
};

/* ── Overview tab (frames 1a/1b/1c) — every value from a real endpoint ── */
let overviewExpanded = false; // Context: show all projects vs top 5 + aggregate
function toggleOverviewExpand() { overviewExpanded = !overviewExpanded; render(); }

// Veto = the real permanent-invalidate. Honest copy (retro has no "blacklist"):
// the rule is marked invalid and won't be re-projected. Task 4 upgrades this
// plain confirm to the desk-dimmed modal; the endpoint call is the same.
async function vetoRule(scope, id) {
  if (!confirm(`Veto ${id}?\n\nRemoved from its managed file and marked invalid — retro won't re-project it. Recoverable via the store's git history.`)) return;
  try { await post("/api/node/invalidate", { scope, id }); render(); refreshStatus(); }
  catch (e) { alert(e.message); }
}

const SCALE = 20000; // shared context-bar scale: 0–20K tokens

views.overview = async () => {
  const [xray, nodes, health, cfg] = await Promise.all([
    get("/api/xray"), get("/api/nodes?active=true"), get("/api/health"), get("/api/config"),
  ]);
  const threshold = Number.isFinite(cfg && cfg.confidence_threshold) ? cfg.confidence_threshold : 0.7;

  // — Learned this week — active nodes updated within 7 days, held = below threshold —
  const weekAgo = Date.now() - 7 * 24 * 3600 * 1000;
  const recent = (nodes || [])
    .filter(n => { const t = Date.parse(n.updated); return !isNaN(t) && t >= weekAgo; })
    .sort((a, b) => String(b.updated).localeCompare(String(a.updated)));
  const held = recent.filter(n => n.confidence < threshold).length;
  const fresh = recent.length - held;
  const shown = recent.slice(0, 6);
  const learnRows = shown.map(n => {
    const isHeld = n.confidence < threshold;
    const meta = isHeld ? `${n.scope} · held` : `${n.scope} · ${n.type}`;
    return `<div class="learn"${isHeld ? ' style="opacity:.55"' : ''}>
      <div class="learn-head">
        <span><b>${esc(n.id)}</b> <span class="learn-meta">${esc(meta)}</span></span>
        <span style="display:flex;gap:8px;align-items:center">
          <span class="conf">${esc(glyph(n.confidence))}</span>
          <span class="btn" onclick="vetoRule('${esc(n.scope)}','${esc(n.id)}')">Veto</span>
        </span>
      </div>
      <div class="learn-desc">${esc(n.body)}</div>
    </div>`;
  }).join("") || `<div class="learn learn-desc">Nothing learned in the last 7 days.</div>`;
  const more = Math.max(0, recent.length - shown.length);
  const learnFoot = `<div class="learn-foot">
    <span>${more ? `+ ${more} more this week · ${held} held` : "vetoed rules never return"}</span>
    <span class="link" onclick="goTab('knowledge')">view all in Knowledge →</span></div>`;
  const learned = `<div class="window ov-learned">
    <div class="titlebar"><span class="box"></span><span class="title">Learned this week</span><span class="meta">${fresh} new · ${held} held</span></div>
    <div class="learn-list">${learnRows}</div>${learnFoot}</div>`;

  // — Context session load — per-project stacked bar of the 4 token sources —
  const g = tok(xray.global_claude_md);
  const projs = (xray.projects || []).map(p => {
    const proj = tok(p.claude_md), retro = tok(p.claude_local_md), mem = tok(p.memory_md);
    return { slug: p.slug, g, proj, retro, mem, total: g + proj + retro + mem };
  }).sort((a, b) => b.total - a.total);
  const seg = (w, cls, extra) => w > 0 ? `<div class="${cls}" style="width:${Math.min(w / SCALE * 100, 100)}%${extra || ""}"></div>` : "";
  const barRow = p => `<span class="ctx-name">${esc(p.slug)}</span>
    <div class="bar">${seg(p.g, "seg-global")}${seg(p.proj, "seg-project")}${seg(p.retro, "seg-retro")}${seg(p.mem, "seg-memory")}</div>
    <span class="ctx-total">${fmtNum(p.total)}</span>`;
  const TOP = 5;
  const showAll = overviewExpanded || projs.length <= TOP;
  let ctxRows = (showAll ? projs : projs.slice(0, TOP)).map(barRow).join("");
  if (!showAll) {
    const rest = projs.slice(TOP), restSum = rest.reduce((s, p) => s + p.total, 0);
    ctxRows += `<span class="ctx-name link dim" onclick="toggleOverviewExpand()">+ ${rest.length} more ▸</span>
      <div class="bar-agg"><div style="width:${Math.min(restSum / SCALE * 100, 100)}%;background:repeating-linear-gradient(90deg,var(--line-soft) 0 4px,transparent 4px 8px)"></div></div>
      <span class="ctx-total dim">${kAbbr(restSum)}</span>`;
  } else if (projs.length > TOP) {
    ctxRows += `<span class="link dim" onclick="toggleOverviewExpand()">show less ▴</span><div></div><span></span>`;
  }
  const legend = `<div class="ctx-legend">
    <span><span class="swatch seg-global"></span> global CLAUDE.md</span>
    <span><span class="swatch seg-project" style="border:1px solid var(--line-soft)"></span> project CLAUDE.md</span>
    <span><span class="swatch seg-retro"></span> retro-owned</span>
    <span><span class="swatch seg-memory" style="border:1px solid var(--accent)"></span> MEMORY.md</span>
    <span style="margin-left:auto">scale 0 – 20K</span></div>`;
  const ctxMeta = overviewExpanded && projs.length > TOP ? `all ${projs.length} · expanded`
    : projs.length > TOP ? `top ${TOP} of ${projs.length} · by weight` : "tokens at session start";
  const context = `<div class="window ov-context">
    <div class="titlebar"><span class="box"></span><span class="title">Context — session load</span><span class="meta">${esc(ctxMeta)}</span></div>
    <div class="ctx-body">${ctxRows || '<span class="dim" style="grid-column:1/-1">no projects tracked yet</span>'}${legend}</div></div>`;

  // — Retro owns — global managed block + each CLAUDE.local.md (NOT MEMORY.md) —
  const owned = [];
  if (xray.global_claude_md && xray.global_claude_md.present)
    owned.push({ label: "~/.claude/CLAUDE.md", nodes: xray.global_active_nodes || 0, toks: g });
  (xray.projects || []).forEach(p => {
    if (p.claude_local_md && p.claude_local_md.present)
      owned.push({ label: `${p.slug}/CLAUDE.local.md`, nodes: p.active_nodes || 0, toks: tok(p.claude_local_md) });
  });
  const ownTokens = owned.reduce((s, f) => s + f.toks, 0);
  const ownRules = (xray.global_active_nodes || 0) + (xray.projects || []).reduce((s, p) => s + (p.active_nodes || 0), 0);
  const top3 = owned.slice(0, 3).map(f => `<div class="kv"><span>${esc(f.label)}</span><span>${f.nodes} · ${fmtNum(f.toks)}</span></div>`).join("");
  const restF = owned.slice(3);
  const fileRows = (top3 || '<div class="kv dim">nothing projected yet</div>') + (restF.length
    ? `<div class="kv dim"><span>+ ${restF.length} more files</span><span>${restF.reduce((s, f) => s + f.nodes, 0)} · ${fmtNum(restF.reduce((s, f) => s + f.toks, 0))}</span></div>` : "");
  const owns = `<div class="window">
    <div class="titlebar"><span class="box"></span><span class="title">Retro owns</span></div>
    <div class="pad">
      <div class="stats">
        <span><span class="stat-n ok">${fmtNum(ownTokens)}</span> <span class="stat-lbl">tok</span></span>
        <span><span class="stat-n">${fmtNum(ownRules)}</span> <span class="stat-lbl">rules</span></span>
        <span><span class="stat-n">${owned.length}</span> <span class="stat-lbl">files</span></span>
      </div>
      <div class="filelist">${fileRows}</div>
    </div></div>`;

  // — Pipeline — store/queue/budget + last observe→analyze→project + push —
  const st = health.stages || {};
  const hhmm = at => { const t = Date.parse(at); if (isNaN(t)) return ""; const d = new Date(t); return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`; };
  const chain = ["observe", "analyze", "project"];
  const failed = chain.find(k => st[k] && !st[k].ok);
  const lastAt = chain.map(k => st[k] && st[k].at).filter(Boolean).sort().pop();
  const runCell = failed ? `<b><span class="bad">✗ ${esc(failed)}</span> ${esc(hhmm(st[failed].at))}</b>`
    : lastAt ? `<b class="ok">✓ ${esc(hhmm(lastAt))}</b>` : `<b class="dim">—</b>`;
  const push = st.push;
  const pushCell = push ? `<b class="${push.ok ? "ok" : "bad"}">${esc(relTime(push.at))} ${push.ok ? "✓" : "✗"}</b>` : `<b class="dim">—</b>`;
  const budR = health.budget_remaining, budM = health.budget_max, queueN = health.queue_len || 0;
  const pipe = `<div class="window">
    <div class="titlebar"><span class="box"></span><span class="title">Pipeline</span></div>
    <div class="pipe">
      <div class="kv"><span>store</span><b>${fmtNum(xray.total_nodes)} nodes</b></div>
      <div class="kv"><span>session queue</span><b class="${queueN > 0 ? "bad" : ""}">${queueN}</b></div>
      <div class="kv"><span>AI budget today</span><b class="${budR === 0 ? "bad" : ""}">${fmtNum(budR)}/${fmtNum(budM)}</b></div>
      <div class="kv"><span>observe → analyze → project</span>${runCell}</div>
      <div class="kv"><span>push</span>${pushCell}</div>
    </div></div>`;

  return `<div class="ov-grid">${learned}${context}<div class="ov-bottom">${owns}${pipe}</div></div>`;
};

let tab = "overview";
let renderSeq = 0;
async function render() {
  // Sequence guard: rapid re-renders (filter changes in later tabs) fire
  // concurrently; only the most recently issued one may write the DOM
  // (last-resolved ≠ last-issued).
  const seq = ++renderSeq;
  let html;
  try { html = await views[tab](); }
  catch (e) { html = `<div class="window"><div class="stub bad">${esc(e.message)}</div></div>`; }
  if (seq !== renderSeq) return;
  const focusedId = document.activeElement?.id;
  $("#main").innerHTML = html;
  // A wholesale innerHTML swap drops focus/cursor — put them back where the
  // user was typing (search boxes etc. in later tabs).
  if (focusedId) {
    const el = $("#" + focusedId);
    if (el) { el.focus(); if (el.setSelectionRange) el.setSelectionRange(el.value.length, el.value.length); }
  }
}

// Switch tab + repaint the active underline. Called by the menu and by
// in-view "view all in X →" links.
function goTab(name) {
  if (!views[name]) return;
  tab = name;
  document.querySelectorAll(".menubar .tab").forEach(b => b.classList.toggle("active", b.dataset.tab === name));
  render();
}
// Top menu bar is the ONLY navigation. The meta cell carries no data-tab, so
// clicking it does nothing (never nav — handoff rule).
$(".menubar").addEventListener("click", e => { if (e.target.dataset.tab) goTab(e.target.dataset.tab); });

/* ── status: menu meta + front panel (pure status, never nav) ───────── */
let hooksState = { ok: true, label: "hooks ok" };

const DAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
function renderMenuMeta() {
  const meta = $("#menuMeta");
  if (!meta) return;
  const d = new Date();
  const date = `${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}`;
  const clock = `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  const dot = `<span class="${hooksState.ok ? "ok" : "bad"}">●</span>`;
  meta.innerHTML = `v${esc(VERSION)} · ${esc(date)} · ${esc(clock)} · ${dot} ${esc(hooksState.label)}`;
}

// RFC3339 timestamp -> "just now" / "Xm ago" / "Xh ago" / "Xd ago"; "—" if absent.
function relTime(at) {
  if (!at) return "—";
  const t = Date.parse(at);
  if (isNaN(t)) return "—";
  const secs = Math.max(0, (Date.now() - t) / 1000);
  if (secs < 60) return "just now";
  const mins = Math.floor(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function setCell(sel, text, alerted) {
  const el = $(sel);
  if (!el) return;
  el.textContent = text;            // textContent -> inherently XSS-safe
  el.classList.toggle("alerted", !!alerted);
}

function updateFrontPanel(xray, health, doctor) {
  const store = xray && Number.isFinite(xray.total_nodes) ? xray.total_nodes : "—";
  const queueLen = health && Number.isFinite(health.queue_len) ? health.queue_len : null;
  const budgetRem = health && Number.isFinite(health.budget_remaining) ? health.budget_remaining : null;
  const budgetMax = health && Number.isFinite(health.budget_max) ? health.budget_max : null;
  const pushAt = health && health.stages && health.stages.push ? health.stages.push.at : null;

  setCell("#fpStore", `store ${store}`, false);
  setCell("#fpQueue", `queue ${queueLen ?? "—"}`, queueLen != null && queueLen > 0);
  setCell(
    "#fpBudget",
    (budgetRem != null && budgetMax != null) ? `budget ${budgetRem}/${budgetMax}` : "budget —",
    budgetRem === 0
  );
  setCell("#fpPush", `push ${relTime(pushAt)}`, false);

  // Health slot = the loudest state on screen. Genuine alerts only: a failed
  // doctor check, a non-empty queue, or an exhausted budget (frame 1c).
  const problems = [];
  if (budgetRem === 0) problems.push("budget exhausted");
  if (queueLen != null && queueLen > 0) problems.push(`${queueLen} queued`);
  const failed = (doctor && Array.isArray(doctor.checks) ? doctor.checks : []).filter(c => !c.ok);
  if (failed.length) problems.push(failed.length === 1 ? failed[0].name : `${failed.length} checks failing`);

  const el = $("#fpHealth");
  if (!el) return;
  if (!health && !doctor) {          // couldn't verify — don't claim healthy
    el.className = "health alert";
    el.textContent = "⚠ unreachable";
  } else if (problems.length) {
    el.className = "health alert";
    el.textContent = `⚠ ${problems.join(" · ")}`;
  } else {
    el.className = "health";
    el.textContent = "✓ healthy";
  }
}

// Refresh the menu meta + front panel from live data. Tolerates per-endpoint
// failure (null). Exposed globally so Tasks 4–6 can call it after any write.
async function refreshStatus() {
  const [xray, health, doctor] = await Promise.all([
    get("/api/xray").catch(() => null),
    get("/api/health").catch(() => null),
    get("/api/doctor").catch(() => null),
  ]);
  const hc = doctor && Array.isArray(doctor.checks)
    ? doctor.checks.find(c => c.name === "hooks") : null;
  hooksState = hc
    ? { ok: !!hc.ok, label: hc.ok ? "hooks ok" : "hooks ?" }
    : { ok: false, label: "hooks ?" };
  renderMenuMeta();
  updateFrontPanel(xray, health, doctor);
}

/* ── boot ───────────────────────────────────────────────────────────── */
renderMenuMeta();                    // paint the clock immediately
render();
refreshStatus();
setInterval(refreshStatus, 30000);   // menu meta + front panel, every 30s
setInterval(renderMenuMeta, 60000);  // keep the clock ticking even if offline
</script>
</body>
</html>
